<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lamaran Page UI</title>
  <style>
    :root {
      --blue-dark: #123e73;
      --blue: #1d4d84;
      --blue-soft: #2d5f96;
      --line: #dfe3e8;
      --text: #111827;
      --muted: #6b7280;
      --bg: #ffffff;
      --input-bg: #f2f2f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .page {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      border-top-left-radius: 4px;
      border-top-right-radius: 4px;
      overflow: hidden;
      border-left: 1px solid transparent;
      border-right: 1px solid transparent;
    }

    .top-bar {
      height: 56px;
      background: var(--blue-dark);
      width: 100%;
    }

    .content {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-top: none;
      padding-bottom: 18px;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 26px;
      padding: 0 22px;
      min-height: 58px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .tab {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      padding: 18px 0 16px;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab .count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      background: #1f4d82;
      border-radius: 2px;
    }

    .search-wrap {
      padding: 18px 20px 14px;
    }

    .search-box {
      position: relative;
      width: 100%;
    }

    .search-box input {
      width: 100%;
      height: 44px;
      border: none;
      outline: none;
      border-radius: 4px;
      background: var(--input-bg);
      padding: 0 46px 0 14px;
      font-size: 14px;
      color: #374151;
    }

    .search-box input::placeholder {
      color: #6b7280;
      font-weight: 600;
    }

    .search-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #0f3f73;
      font-size: 18px;
      pointer-events: none;
    }

    .filter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 8px 20px 0;
      flex-wrap: wrap;
    }

    .filters-left {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .filter-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #0f3f73;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .filter-item .arrow {
      font-size: 11px;
      transform: translateY(1px);
      color: #0f3f73;
    }

    .checkbox-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #1f2937;
      font-size: 14px;
      white-space: nowrap;
    }

    .checkbox-wrap input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #1f4d82;
      cursor: pointer;
    }

    .actions {
      margin-left: auto;
    }

    .btn-outline {
      height: 30px;
      padding: 0 14px;
      border: 1px solid #1f4d82;
      background: #fff;
      color: #1f4d82;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-outline:hover {
      background: #f8fbff;
    }

    @media (max-width: 900px) {
      .tabs {
        gap: 18px;
      }

      .filter-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .actions {
        margin-left: 0;
        padding-top: 6px;
      }
    }

    @media (max-width: 640px) {
      .page {
        max-width: 100%;
      }

      .tabs {
        gap: 14px;
        padding: 0 14px;
      }

      .search-wrap,
      .filter-row {
        padding-left: 14px;
        padding-right: 14px;
      }

      .filters-left {
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-bar"></div>

    <div class="content">
      <div class="tabs">
        <div class="tab">
          <span>Leads</span>
          <span class="count">86818</span>
        </div>

        <div class="tab active">
          <span>Lamaran</span>
          <span class="count">1144</span>
        </div>

        <div class="tab">
          <span>Bookmark</span>
          <span class="count">1</span>
        </div>

        <div class="tab">
          <span>Ditawarkan</span>
          <span class="count">0</span>
        </div>

        <div class="tab">
          <span>Wawancara</span>
          <span class="count">0</span>
        </div>

        <div class="tab">
          <span>Diterima</span>
          <span class="count">0</span>
        </div>

        <div class="tab">
          <span>Arsip</span>
          <span class="count">18</span>
        </div>
      </div>

      <div class="search-wrap">
        <div class="search-box">
          <input type="text" placeholder="Cari berdasarkan nama" />
          <div class="search-icon">⌕</div>
        </div>
      </div>

      <div class="filter-row">
        <div class="filters-left">
          <div class="filter-item">
            <span>Min Pendidikan (0)</span>
            <span class="arrow">▼</span>
          </div>

          <div class="filter-item">
            <span>Lokasi (0)</span>
            <span class="arrow">▼</span>
          </div>

          <div class="filter-item">
            <span>Pengalaman (0)</span>
            <span class="arrow">▼</span>
          </div>

          <div class="filter-item">
            <span>Jenis kelamin (0)</span>
            <span class="arrow">▼</span>
          </div>

          <div class="filter-item">
            <span>Usia (0)</span>
            <span class="arrow">▼</span>
          </div>

          <label class="checkbox-wrap">
            <input type="checkbox" />
            <span>Disabilitas</span>
          </label>
        </div>

        <div class="actions">
          <button class="btn-outline">Pilih Semua</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll(".tab");

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
      });
    });
  </script>
</body>
</html>
